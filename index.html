<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Lamtana — Zeiterfassung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold:       #C9A84C;
  --gold-light: #E8C96A;
  --gold-dark:  #A07830;
  --black:      #0D0D0D;
  --dark:       #1A1A1A;
  --surface:    #111111;
  --card:       #1E1E1E;
  --border:     #2A2A2A;
  --text:       #F5F0E8;
  --text-muted: #8A8070;
  --green:      #4CAF7C;
  --yellow:     #F0B429;
  --red:        #E05252;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--surface);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
h1, h2, h3, h4 { font-family: 'Playfair Display', serif; }

/* ── UTILITIES ─────────────────────────────── */
.hidden { display: none !important; }
.flex { display: flex; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-2 { gap: 0.5rem; }
.gap-4 { gap: 1rem; }
.mt-4 { margin-top: 1rem; }
.text-gold { color: var(--gold); }
.text-muted { color: var(--text-muted); }

/* ── SCROLLBAR ─────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--dark); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── CARD ──────────────────────────────────── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem;
}

/* ── BUTTON ────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 0.4rem;
  padding: 0.55rem 1.2rem;
  border: none; border-radius: 8px;
  font-family: 'Inter', sans-serif; font-size: 0.875rem; font-weight: 500;
  cursor: pointer; transition: all 0.2s;
}
.btn-gold {
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: var(--black);
}
.btn-gold:hover { background: linear-gradient(135deg, var(--gold-light), var(--gold)); transform: translateY(-1px); }
.btn-outline {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
}
.btn-outline:hover { border-color: var(--gold); color: var(--gold); }
.btn-danger { background: var(--red); color: #fff; }
.btn-danger:hover { background: #c04040; }
.btn-sm { padding: 0.35rem 0.8rem; font-size: 0.8rem; }

/* ── INPUT ─────────────────────────────────── */
input, select, textarea {
  width: 100%;
  background: var(--dark);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 0.9rem;
  padding: 0.65rem 0.9rem;
  outline: none;
  transition: border-color 0.2s;
}
input:focus, select:focus { border-color: var(--gold); }
select option { background: var(--dark); }
label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.3rem; font-weight: 500; }
.form-group { margin-bottom: 1rem; }

/* ── TABLE ─────────────────────────────────── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
th { text-align: left; padding: 0.75rem 1rem; color: var(--gold); font-weight: 500; font-size: 0.78rem; letter-spacing: 0.05em; text-transform: uppercase; border-bottom: 1px solid var(--border); }
td { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); color: var(--text-muted); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(201,168,76,0.04); }

/* ── BADGE ─────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center; gap: 0.25rem;
  padding: 0.2rem 0.6rem; border-radius: 99px;
  font-size: 0.75rem; font-weight: 500;
}
.badge-green { background: rgba(76,175,124,0.15); color: var(--green); }
.badge-yellow { background: rgba(240,180,41,0.15); color: var(--yellow); }
.badge-red { background: rgba(224,82,82,0.15); color: var(--red); }
.badge-gold { background: rgba(201,168,76,0.15); color: var(--gold); }
.badge-muted { background: rgba(138,128,112,0.15); color: var(--text-muted); }

/* ── MODAL ─────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.modal-overlay.active { opacity: 1; pointer-events: all; }
.modal {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 2rem;
  width: 100%; max-width: 480px;
  transform: translateY(20px);
  transition: transform 0.25s;
}
.modal-overlay.active .modal { transform: translateY(0); }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
.modal-header h3 { font-size: 1.2rem; }
.modal-close { background: none; border: none; color: var(--text-muted); font-size: 1.3rem; cursor: pointer; line-height: 1; }
.modal-close:hover { color: var(--text); }
.modal-footer { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.5rem; }

/* ── TOAST ─────────────────────────────────── */
#toast-container {
  position: fixed; bottom: 1.5rem; right: 1.5rem;
  display: flex; flex-direction: column; gap: 0.5rem;
  z-index: 9999;
}
.toast {
  display: flex; align-items: center; gap: 0.75rem;
  background: var(--card);
  border: 1px solid var(--border);
  border-left: 3px solid var(--gold);
  border-radius: 10px;
  padding: 0.85rem 1.2rem;
  font-size: 0.875rem;
  min-width: 240px; max-width: 340px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  animation: slideIn 0.3s ease;
}
.toast.success { border-left-color: var(--green); }
.toast.error   { border-left-color: var(--red); }
.toast.warning { border-left-color: var(--yellow); }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes slideOut { to { transform: translateX(120%); opacity: 0; } }
.toast.removing { animation: slideOut 0.3s ease forwards; }

/* ══════════════════════════════════════════════
   LOGIN SCREEN
══════════════════════════════════════════════ */
#login-screen {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.07) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.05) 0%, transparent 50%),
    var(--surface);
  padding: 1rem;
}
.login-box {
  width: 100%; max-width: 420px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3rem 2.5rem;
  box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  text-align: center;
}
.login-logo {
  margin-bottom: 2.5rem;
}
.login-logo .logo-mark {
  font-size: 2.5rem;
  letter-spacing: 0.15em;
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  line-height: 1;
}
.login-logo .logo-sub {
  font-size: 0.7rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-top: 0.4rem;
}
.login-logo .logo-divider {
  width: 60px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 1rem auto 0;
}
.login-title {
  font-size: 1.1rem;
  color: var(--text-muted);
  font-weight: 400;
  margin-bottom: 2rem;
  font-family: 'Inter', sans-serif;
}
.pin-display {
  display: flex; gap: 0.75rem; justify-content: center;
  margin-bottom: 1.5rem;
}
.pin-dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: transparent;
  transition: all 0.2s;
}
.pin-dot.filled {
  background: var(--gold);
  border-color: var(--gold);
  box-shadow: 0 0 10px rgba(201,168,76,0.5);
}
.pin-input-wrap { position: relative; margin-bottom: 1.5rem; }
.pin-input-wrap input {
  text-align: center;
  font-size: 1.5rem;
  letter-spacing: 0.5em;
  padding: 0.9rem;
  border-color: var(--border);
  -webkit-text-security: disc;
}
.pin-input-wrap input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.15); }
.login-name-field { margin-bottom: 1.5rem; text-align: left; }
.btn-login {
  width: 100%;
  padding: 0.9rem;
  font-size: 1rem; font-weight: 600;
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: var(--black);
  border: none; border-radius: 10px;
  cursor: pointer; transition: all 0.2s;
  font-family: 'Inter', sans-serif;
}
.btn-login:hover { background: linear-gradient(135deg, var(--gold-light), var(--gold)); transform: translateY(-1px); box-shadow: 0 8px 20px rgba(201,168,76,0.3); }
.login-hint {
  margin-top: 1.5rem;
  font-size: 0.78rem;
  color: var(--text-muted);
  line-height: 1.6;
}
.login-error {
  margin-top: 1rem;
  padding: 0.75rem;
  background: rgba(224,82,82,0.1);
  border: 1px solid rgba(224,82,82,0.3);
  border-radius: 8px;
  color: var(--red);
  font-size: 0.85rem;
}

/* ══════════════════════════════════════════════
   APP SHELL (Admin + User)
══════════════════════════════════════════════ */
#app-shell { min-height: 100vh; display: flex; flex-direction: column; }

/* ── TOPBAR ────────────────────────────────── */
.topbar {
  height: 60px;
  background: var(--dark);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 1.5rem;
  position: sticky; top: 0; z-index: 100;
}
.topbar-logo {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--gold-light), var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  letter-spacing: 0.05em;
}
.topbar-logo span { font-size: 0.75rem; letter-spacing: 0.2em; color: var(--text-muted); display: block; -webkit-text-fill-color: var(--text-muted); }
.topbar-right { display: flex; align-items: center; gap: 1rem; }
#live-clock { font-size: 1.1rem; font-variant-numeric: tabular-nums; color: var(--gold); font-weight: 500; }
.topbar-user { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: var(--text-muted); }
.topbar-user .avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem; font-weight: 700; color: var(--black);
}
.btn-logout { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.8rem; padding: 0.3rem 0.6rem; border-radius: 6px; transition: all 0.2s; font-family: 'Inter', sans-serif; }
.btn-logout:hover { color: var(--red); background: rgba(224,82,82,0.1); }

/* ── TAB NAV ───────────────────────────────── */
.tab-nav {
  background: var(--dark);
  border-bottom: 1px solid var(--border);
  display: flex; gap: 0;
  padding: 0 1.5rem;
  overflow-x: auto;
}
.tab-btn {
  background: none; border: none; border-bottom: 2px solid transparent;
  color: var(--text-muted); cursor: pointer;
  font-family: 'Inter', sans-serif; font-size: 0.875rem; font-weight: 500;
  padding: 0.9rem 1.2rem;
  white-space: nowrap;
  transition: all 0.2s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

/* ── MAIN CONTENT ──────────────────────────── */
.main-content { flex: 1; padding: 2rem 1.5rem; max-width: 1200px; margin: 0 auto; width: 100%; }
.tab-panel { display: none; animation: fadeIn 0.25s ease; }
.tab-panel.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ── PAGE HEADER ───────────────────────────── */
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
.page-header h2 { font-size: 1.5rem; }
.page-header h2 small { font-size: 0.85rem; color: var(--text-muted); font-family: 'Inter', sans-serif; font-weight: 400; margin-left: 0.5rem; }

/* ── STAT CARDS ────────────────────────────── */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
.stat-card .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; }
.stat-card .stat-value { font-size: 1.75rem; font-family: 'Playfair Display', serif; color: var(--gold); line-height: 1; }
.stat-card .stat-sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.3rem; }

/* ── FOOTER ────────────────────────────────── */
footer {
  text-align: center; padding: 1.2rem;
  border-top: 1px solid var(--border);
  font-size: 0.75rem; color: var(--text-muted);
  letter-spacing: 0.05em;
}
footer span { color: var(--gold); }

/* ══════════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════════ */
@media (max-width: 640px) {
  .login-box { padding: 2rem 1.5rem; }
  .main-content { padding: 1rem; }
  .topbar { padding: 0 1rem; }
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<!-- ══ TOAST CONTAINER ══ -->
<div id="toast-container"></div>

<!-- ══ LOGIN SCREEN ══════════════════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-mark">LAMTANA</div>
      <div class="logo-sub">Ischgl · Tirol</div>
      <div class="logo-divider"></div>
    </div>
    <p class="login-title">Zeiterfassung</p>

    <div class="login-name-field">
      <label for="login-name">Benutzername</label>
      <input type="text" id="login-name" placeholder="z.B. admin oder maria.rudigier" autocomplete="off">
    </div>

    <div class="pin-display" id="pin-display">
      <div class="pin-dot" id="dot-0"></div>
      <div class="pin-dot" id="dot-1"></div>
      <div class="pin-dot" id="dot-2"></div>
      <div class="pin-dot" id="dot-3"></div>
    </div>

    <div class="pin-input-wrap">
      <input type="password" id="pin-input" maxlength="4" placeholder="PIN eingeben" inputmode="numeric" pattern="[0-9]*">
    </div>

    <button class="btn-login" onclick="doLogin()">Anmelden</button>

    <div id="login-error" class="login-error hidden"></div>

    <p class="login-hint">
      Admin: <strong>admin</strong> / PIN: <strong>0000</strong><br>
      Mitarbeiter: Vorname.Nachname + persönliche PIN
    </p>
  </div>
</div>

<!-- ══ APP SHELL ═════════════════════════════ -->
<div id="app-shell" class="hidden">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-logo">
      LAMTANA
      <span>Zeiterfassung</span>
    </div>
    <div class="topbar-right">
      <div id="live-clock">00:00:00</div>
      <div class="topbar-user">
        <div class="avatar" id="topbar-avatar">?</div>
        <span id="topbar-name">—</span>
      </div>
      <button class="btn-logout" onclick="doLogout()">Abmelden ↗</button>
    </div>
  </header>

  <!-- ADMIN PANEL -->
  <div id="admin-panel" class="hidden">
    <nav class="tab-nav">
      <button class="tab-btn active" onclick="switchTab('tab-mitarbeiter', this)">👥 Mitarbeiter</button>
      <button class="tab-btn" onclick="switchTab('tab-arbeitsplaene', this)">📅 Arbeitspläne</button>
      <button class="tab-btn" onclick="switchTab('tab-uebersicht', this)">📊 Übersicht</button>
      <button class="tab-btn" onclick="switchTab('tab-export', this)">📤 Export</button>
    </nav>
    <div class="main-content">
      <div id="tab-mitarbeiter" class="tab-panel active"><!-- filled by JS --></div>
      <div id="tab-arbeitsplaene" class="tab-panel"><!-- filled by JS --></div>
      <div id="tab-uebersicht" class="tab-panel"><!-- filled by JS --></div>
      <div id="tab-export" class="tab-panel"><!-- filled by JS --></div>
    </div>
  </div>

  <!-- USER DASHBOARD -->
  <div id="user-dashboard" class="hidden">
    <div class="main-content" id="user-content"><!-- filled by JS --></div>
  </div>

  <footer>
    Hotel <span>Lamtana</span> Ischgl &copy; 2026 &mdash; Zeiterfassungssystem
  </footer>
</div>

<!-- ══ MODALS ════════════════════════════════ -->
<div id="modal-overlay" class="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <h3 id="modal-title">Modal</h3>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════
// PLACEHOLDER — JS wird in Schritt 2 eingefügt
// ════════════════════════════════════════════════

// Hilfsfunktionen für Tabs & Modals (werden in Schritt 2 ersetzt)
function switchTab(panelId, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(panelId).classList.add('active');
  btn.classList.add('active');
}

function openModal() { document.getElementById('modal-overlay').classList.add('active'); }
function closeModalDirect() { document.getElementById('modal-overlay').classList.remove('active'); }
function closeModal(e) { if (e.target === document.getElementById('modal-overlay')) closeModalDirect(); }

function showToast(msg, type = 'info') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { t.classList.add('removing'); setTimeout(() => t.remove(), 300); }, 3000);
}

// Uhr
(function tick() {
  const el = document.getElementById('live-clock');
  if (el) el.textContent = new Date().toLocaleTimeString('de-AT');
  setTimeout(tick, 1000);
})();

// PIN-Punkte
document.getElementById('pin-input').addEventListener('input', function() {
  const len = this.value.length;
  for (let i = 0; i < 4; i++) {
    document.getElementById('dot-' + i).classList.toggle('filled', i < len);
  }
});
document.getElementById('pin-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// Platzhalter Login
function doLogin() { showToast('Schritt 2 wird geladen…', 'warning'); }
function doLogout() { location.reload(); }
</script>
</body>
</html>
